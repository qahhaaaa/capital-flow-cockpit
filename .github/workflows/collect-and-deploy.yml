# 定时采集 cockpit/v2 资金流数据 + 部署静态面板到 GitHub Pages。
# 设计要点 / 约束详见 docs/project-handover.md 第 11 节。
#
# - 采集零 secret：只用免费无 key API（FRED / DeFiLlama / OKX / CoinGecko）。
#   Telegram 推送为可选增强：配置 TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID 两个 repo secret 后启用；
#   未配置时推送步骤静默跳过（exit 0），不影响采集与部署。仅状态变化时才发消息（对比上一次
#   已提交的 cockpit.json），避免定时刷屏。
# - 零代理：云端 runner 直连可达；src/cockpit/providers/http.mjs 的 getJsonViaProxy 在没有
#   HTTPS_PROXY 时自动走直连，因此这里不设置任何代理 env。
# - OKX 封美国 IP：GitHub 托管 runner 多在美国/Azure → L4(OKX 衍生品) 可能 451 / 被拒。
#   这是预期内：scripts/collect-cockpit.mjs 对每个数据源做失败隔离，OKX 失败时 L4 标 missing、
#   其余四层照常，脚本仍 exit 0 → 本 workflow 不会因此失败。要补 L4 需用非美 self-hosted runner。
# - 历史持久化：链间轮动 / 百分位依赖 public/data/cockpit-history.json。runner 是临时环境，
#   必须每次把它（连同 cockpit.json）commit 回 main 才能跨 run 累积 → .gitignore 已放行这两个文件。
# - 防自我触发：本 workflow 既被 push:main 触发、又把数据 commit 回 main，存在自我循环风险。
#   三重防护：① 下方 push.paths-ignore 忽略这两个数据文件 ② 提交信息带 [skip ci]
#   ③ 用默认 GITHUB_TOKEN 推送（GitHub 设计上不会再触发新 run）。
# - GitHub Pages 公开可读：面板（行情 + 仓位建议）将全网可见；不含密钥 / PII。

name: collect-and-deploy

on:
  schedule:
    # 每小时第 17 分（避开整点的 GitHub 定时高峰,减少排队延迟）。GitHub 定时为 best-effort。
    # 1h 采集下滚动历史上限 720 点 ≈ 30 天;链流 delta 已按真实时间锚定,不受采集频率影响。
    - cron: "17 * * * *"
  workflow_dispatch: {} # 手动触发（仓库 Actions 页面 "Run workflow"）
  push:
    branches: [main]
    paths-ignore:
      # 只忽略 bot 自己回写的两个数据文件 → 数据回写不会自我触发；
      # 改代码 / public/ 其它内容 / macro-context.json 仍会触发部署。
      # 注意：paths-ignore 只作用于 push，schedule 与 workflow_dispatch 不受影响，照常运行。
      - "public/data/cockpit.json"
      - "public/data/cockpit-history.json"

# 串行化：同一时刻只跑一个，避免数据回写 push 竞争 + Pages 并发部署冲突。
# cancel-in-progress: false → 不打断正在进行的部署。
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write # 把刷新后的数据文件 commit 回仓库（历史累积）
  pages: write # 部署到 GitHub Pages
  id-token: write # actions/deploy-pages 的 OIDC 鉴权

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # 不开启 npm cache：本项目零依赖、无 package-lock.json，开 cache 会因找不到 lockfile 报错。

      # 零依赖、无 lockfile → 不需要 npm ci / npm install（npm ci 反而会因缺 lockfile 失败）。
      # npm test 失败即非零退出 → 本步骤失败 → 后续步骤全部跳过（采集/部署中止）。
      - name: Run unit tests (gate)
        run: npm test

      # 直连采集（无代理 env）。单源失败被脚本隔离，整体仍 exit 0；L4/OKX 在美区 runner 多半 missing。
      - name: Collect cockpit snapshot
        run: node scripts/collect-cockpit.mjs

      # 状态变化推送（可选）：HEAD 里的 cockpit.json 是上一次 run 提交的状态（本 run 的 commit 在后面），
      # 用它与刚采集的新快照做 diff。脚本自带失败隔离：无 secret 跳过 / 发送失败仅告警，永不 fail 本 job。
      - name: Snapshot previous cockpit state (for change detection)
        run: git show HEAD:public/data/cockpit.json > /tmp/prev-cockpit.json 2>/dev/null || echo "no previous committed snapshot"

      - name: Telegram notify on state change (skips when secrets absent)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/notify-telegram.mjs /tmp/prev-cockpit.json public/data/cockpit.json

      # 把刷新后的数据文件回写 main，让 cockpit-history.json 跨 run 累积。
      # 仅在确有变化时提交；[skip ci] + 上面的 paths-ignore 共同防止自我触发。
      - name: Commit refreshed data back to main (rolling history)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/cockpit.json public/data/cockpit-history.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): refresh cockpit snapshot + rolling history [skip ci]"
            # 竞态防护:重跑(re-run)时上一 attempt 可能已把数据 commit 进 main,基于触发时
            # SHA 的 push 会非快进被拒。rebase -X theirs 让本次(更新)的采集数据获胜;仍失败
            # 则警告并放行——丢一个数据点(下一小时补上)远好于让部署整体失败。
            if ! git pull --rebase -X theirs origin main; then
              git rebase --abort || true
              echo "::warning::data commit skipped (concurrent run advanced main)"
              exit 0
            fi
            git push || echo "::warning::data push failed, skipped (next hourly run re-appends)"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # 部署整个 public/（含刚生成的 cockpit.json/cockpit-history.json 与入库的 macro-context.json）。
      - name: Upload public/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
