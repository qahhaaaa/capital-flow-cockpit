<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>资金流向与轮动驾驶舱</title>
    <style>
      :root {
        --bg: #0e1116; --panel: #161b22; --line: #2a3340; --txt: #e6edf3; --muted: #8b949e;
        --up: #3fb950; --down: #f85149; --warn: #d29922; --flat: #6e7681; --accent: #58a6ff;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--txt);
        font: 14px/1.5 -apple-system, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif; }
      .wrap { max-width: 1040px; margin: 0 auto; padding: 20px 16px 56px; }
      h1 { font-size: 20px; margin: 0 0 2px; }
      .sub { color: var(--muted); font-size: 12px; }
      .advisory { margin: 12px 0 0; padding: 8px 12px; border: 1px solid var(--warn);
        border-radius: 8px; color: var(--warn); font-size: 12px; background: rgba(210,153,34,.08); }
      .grid { display: grid; gap: 14px; }
      .grid > .panel { min-width: 0; } /* let grid items shrink below table min-width (they scroll inside) */
      @media (min-width: 760px) { .two { grid-template-columns: 1fr 1fr; } }
      .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; }
      .panel h2 { font-size: 13px; letter-spacing: .04em; color: var(--muted);
        text-transform: uppercase; margin: 0 0 10px; font-weight: 600; }
      .how { color: var(--muted); font-size: 12px; margin: -4px 0 10px; }
      .regime { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
      .badge { padding: 3px 10px; border-radius: 999px; font-weight: 700; font-size: 13px; border: 1px solid var(--line); }
      .b-risk_on { color: var(--up); border-color: var(--up); }
      .b-risk_off { color: var(--down); border-color: var(--down); }
      .b-neutral { color: var(--txt); }
      .b-unknown { color: var(--muted); }
      .conclusion-card { display: grid; gap: 10px; }
      .decision-line { display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap; min-height: 32px; }
      .decision-label { color: var(--muted); font-size: 12px; min-width: 48px; padding-top: 3px; }
      .decision-body { flex: 1 1 220px; min-width: 0; }
      .decision-main { display: inline-flex; gap: 8px; align-items: center; flex-wrap: wrap; font-weight: 700; }
      .agreement { font-weight: 700; }
      .agreement-up { color: var(--up); }
      .agreement-down { color: var(--down); }
      .agreement-mixed { color: var(--warn); }
      .risk-count { display: inline-flex; align-items: center; min-height: 22px; padding: 1px 7px; border-radius: 999px;
        border: 1px solid var(--line); color: var(--muted); font-size: 12px; margin-left: 4px; }
      .action-chips { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-right: 8px; }
      .trust-bar { padding: 10px 12px; }
      .trust-bar summary { cursor: pointer; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; min-height: 32px; list-style: none; }
      .trust-bar summary::-webkit-details-marker { display: none; }
      .trust-details { border-top: 1px solid var(--line); margin-top: 8px; padding-top: 8px; font-size: 12px; color: var(--muted); }
      .dot-row { display: inline-flex; gap: 6px; align-items: center; }
      .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; border: 1px solid transparent; }
      .dot-ok { background: var(--up); }
      .dot-partial { background: var(--warn); }
      .dot-missing { background: var(--down); }
      .table-scroll { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .table-scroll table { min-width: 560px; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { text-align: left; padding: 7px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
      th { color: var(--muted); font-weight: 600; }
      .num { text-align: right; font-variant-numeric: tabular-nums; }
      .up { color: var(--up); } .down { color: var(--down); } .flat { color: var(--flat); } .warn { color: var(--warn); } .muted { color: var(--muted); }
      .tier { font-weight: 700; padding: 2px 8px; border-radius: 6px; display: inline-block; }
      .tier-standard { color: #03150a; background: var(--up); }
      .tier-small { color: var(--up); border: 1px solid var(--up); }
      .tier-probe { color: var(--warn); border: 1px solid var(--warn); }
      .tier-flat { color: var(--flat); border: 1px solid var(--flat); }
      .tier-text-standard { color: var(--up); font-weight: 700; }
      .tier-text-small { color: var(--up); }
      .tier-text-probe { color: var(--warn); }
      .tier-text-flat { color: var(--flat); }
      .q { font-size: 11px; padding: 1px 6px; border-radius: 5px; border: 1px solid var(--line); color: var(--muted); }
      .q-ok { color: var(--up); border-color: var(--up); }
      .q-partial { color: var(--warn); border-color: var(--warn); }
      .q-missing { color: var(--down); border-color: var(--down); }
      .tags { color: var(--muted); font-size: 12px; }
      .guidance-main-row { cursor: pointer; }
      .guidance-main-row:hover { background: rgba(88,166,255,.05); }
      .guidance-toggle { width: 24px; height: 24px; border: 1px solid var(--line); border-radius: 6px;
        background: transparent; color: var(--accent); cursor: pointer; font-weight: 700; line-height: 1; }
      .target-cell { display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap; }
      .chain-chip { display: inline-flex; align-items: center; min-height: 20px; padding: 1px 6px; border: 1px solid var(--line);
        border-radius: 999px; color: var(--accent); font-size: 11px; line-height: 1.2; }
      .detail-row > td { background: rgba(88,166,255,.04); padding: 10px 12px; }
      .guidance-detail { display: grid; gap: 12px; min-width: 520px; }
      .guidance-detail h3 { margin: 0 0 6px; font-size: 12px; color: var(--muted); font-weight: 600; }
      .contract-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-height: 32px; margin-bottom: 6px;
        border: 1px solid var(--line); border-radius: 6px; padding: 7px 8px; background: rgba(14,17,22,.36); }
      .contract-row > span { color: var(--muted); font-size: 11px; }
      .ca-value { font-size: 12px; font-variant-numeric: tabular-nums; overflow-wrap: anywhere; word-break: break-word; }
      .copy-btn { min-height: 32px; padding: 4px 10px; border: 1px solid var(--line); border-radius: 6px;
        background: transparent; color: var(--accent); cursor: pointer; font-size: 12px; }
      .copy-btn:disabled { cursor: default; opacity: .72; }
      .ext-link { display: inline-flex; align-items: center; min-height: 32px; padding: 4px 10px; border: 1px solid var(--line);
        border-radius: 6px; color: var(--accent); font-size: 12px; text-decoration: none; }
      .deriv { margin-top: 10px; }
      .deriv summary { cursor: pointer; color: var(--accent); font-size: 12px; min-height: 32px; display: flex; align-items: center; }
      .deriv-body { margin-top: 8px; display: grid; gap: 8px; font-size: 12px; }
      .sector-deriv { border-left: 2px solid var(--line); padding-left: 8px; }
      .risk-list { margin: 0; padding-left: 18px; display: grid; gap: 3px; font-size: 12px; }
      .metric-grid { display: grid; grid-template-columns: repeat(4, minmax(120px, 1fr)); gap: 6px; }
      .metric-item, .factor-item { border: 1px solid var(--line); border-radius: 6px; padding: 7px 8px; background: rgba(14,17,22,.36); }
      .metric-item span { display: block; color: var(--muted); font-size: 11px; }
      .metric-item strong { font-size: 12px; font-variant-numeric: tabular-nums; }
      .factor-list { display: grid; gap: 6px; }
      .factor-item { display: grid; grid-template-columns: 150px minmax(220px, 1fr) 72px; gap: 8px; align-items: start; }
      .gap-note { border-top: 1px solid var(--line); padding-top: 8px; }      .err { color: var(--down); }
      .edge { color: var(--accent); }
      .macro-context { margin-bottom: 14px; }
      .macro-context-shell { margin-top: 14px; }
      .macro-context-shell summary { cursor: pointer; min-height: 32px; color: var(--muted); font-weight: 600; }
      .macro-context-shell .macro-context { margin: 10px 0 0; }
      .macro-context-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      .macro-chart-grid { display: grid; gap: 12px; }
      @media (min-width: 960px) { .macro-chart-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
      .macro-chart-card { border: 1px solid var(--line); border-radius: 8px; padding: 10px; min-width: 0; }
      .macro-chart-title { min-height: 42px; display: flex; flex-direction: column; gap: 2px; font-size: 12px; }
      .macro-svg { display: block; width: 100%; height: auto; margin-top: 8px; overflow: visible; }
      .macro-line { fill: none; stroke-width: 2.2; stroke-linejoin: round; stroke-linecap: round; }
      .macro-grid-line { stroke: var(--line); stroke-width: 1; }
      .macro-axis { fill: var(--muted); font-size: 10px; font-variant-numeric: tabular-nums; }
      .macro-point { fill: var(--panel); stroke-width: 2; }
      .macro-point:not(.estimate):not(.disputed) { fill: currentColor; }
      .macro-point.disputed { stroke-dasharray: 3 2; }
      .macro-legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; font-size: 11px; color: var(--muted); }
      .macro-legend span { display: inline-flex; align-items: center; gap: 5px; }
      .macro-legend i { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
      .macro-flag-note { margin-top: 4px; font-size: 11px; }
      .macro-note { margin: 8px 0 0; font-size: 11px; }
      .macro-breakdown { margin-top: 8px; display: grid; gap: 4px; font-size: 11px; }
      .macro-break-row { display: grid; grid-template-columns: 62px 1fr 38px; align-items: center; gap: 6px; }
      .macro-break-row div { height: 6px; border-radius: 999px; background: rgba(139,148,158,.18); overflow: hidden; }
      .macro-break-row b { display: block; height: 100%; border-radius: inherit; background: var(--accent); }
      .macro-context-foot { border-top: 1px solid var(--line); margin-top: 12px; padding-top: 10px; display: grid; gap: 6px; font-size: 11px; }
      .macro-context-foot a { color: var(--accent); text-decoration: none; margin-left: 6px; }
      footer { color: var(--muted); font-size: 11px; margin-top: 18px; }
      @media (max-width: 480px) {
        body { font-size: 12px; }
        .wrap { padding: 14px 10px 42px; }
        .panel { padding: 11px 10px; border-radius: 8px; }
        .panel h2 { font-size: 12px; margin-bottom: 8px; }
        .conclusion-card { gap: 8px; }
        .decision-line { gap: 6px; }
        .decision-label { min-width: 42px; font-size: 12px; }
        .decision-main { font-size: 14px; }
        .conclusion-card .badge { font-size: 16px; min-height: 32px; display: inline-flex; align-items: center; }
        .badge, .tier, .q, .risk-count { min-height: 32px; display: inline-flex; align-items: center; }
        th, td { padding: 6px 7px; font-size: 12px; }
        .table-scroll table { min-width: 520px; }
        .table-scroll table.guidance-table { min-width: 560px; }
        .guidance-detail { min-width: 520px; }
        .metric-grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
        .contract-row { align-items: flex-start; }
        .copy-btn { min-width: 56px; }
        .factor-item { grid-template-columns: 1fr; }        .hide-mobile { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>资金流向与轮动驾驶舱 <span class="sub">cockpit/v2</span></h1>
      <div id="app"><p class="muted">加载中…</p></div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
